services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  fastapi:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+psycopg2://warehouse:warehouse@postgres:5432/warehouse
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nextjs:
    build: ./frontend
    environment:
      - FASTAPI_URL=http://fastapi:8000
      - JWT_SECRET=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - NEXT_PUBLIC_APP_URL=http://localhost
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
